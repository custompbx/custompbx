<main class="login-page">
  <section class="login-shell" aria-label="CustomPBX login">
    <div class="brand-panel">
      <img class="logo" src="./assets/img/logo-big.png" alt="CustomPBX">
      <div class="brand-copy">
        <h1>CustomPBX</h1>
        <p>Sign in to manage your PBX, calls, routing and system configuration.</p>
      </div>
    </div>

    <form class="login-card" (ngSubmit)="onSubmit()" ngNativeValidate>
      <div class="login-card__header">
        <h2>Welcome back</h2>
        <p>Use your administrator credentials to continue.</p>
      </div>

      <label class="login-field">
        <span>Login</span>
        <input [(ngModel)]="user.login" name="login" placeholder="admin" required autocomplete="username" autofocus>
      </label>

      <label class="login-field">
        <span>Password</span>
        <input [(ngModel)]="user.password" name="password" type="password" placeholder="Enter password" required autocomplete="current-password">
      </label>

      @if (userService.errorMessage) {
        <div class="login-error" role="alert">
          {{userService.errorMessage}}
        </div>
      }

      <button class="login-submit" type="submit">Sign in</button>
    </form>
  </section>
</main>

@for (item of menuItems; track item) {
  @if (item.subMenu) {
      <mat-expansion-panel class="mat-elevation-z0 nopadding menu-panel" [class.menu-section-active]="isMenuSectionActive(item)">
      <mat-expansion-panel-header class="mep-header" [attr.aria-label]="item.name + ' navigation section'">
        <mat-panel-title [routerLink]="item.route ? [item.route] : null" class="menu-title">
          <mat-icon class="icon-spacer menu-name-1 menu-name-2">{{item.icon}}</mat-icon><span class="menu-name-2">{{item.name}}</span>
        </mat-panel-title>
      </mat-expansion-panel-header>
      @for (subItem of item.subMenu; track subItem) {
        <a [routerLink]="[subItem.route]" class="menu-sub-item" [class.menu-item-active]="isRouteActive(subItem.route)"
          [attr.aria-current]="isRouteActive(subItem.route) ? 'page' : null">
          <mat-icon class="icon-spacer menu-sub-icon-2">{{subItem.icon}}</mat-icon>
          <span class="menu-sub-name-2">{{subItem.name}}</span></a>
        }
      </mat-expansion-panel>
    }
    @if (!item.subMenu) {
      <a [routerLink]="[item.route]" class="menu-item" [class.menu-item-active]="isRouteActive(item.route)"
        [attr.aria-current]="isRouteActive(item.route) ? 'page' : null" [attr.aria-label]="item.name">
        <mat-icon class="icon-spacer">{{item.icon}}</mat-icon>
        <span class="menu-name-2">{{item.name}}</span>
      </a>
    }
  }

<app-inner-header name="Directory" [loadCounter]="loadCounter()"></app-inner-header>
<app-module-not-exists-banner [list]="list()"></app-module-not-exists-banner>
 <mat-tab-group class="cpbx-tabs" mat-stretch-tabs="false" mat-align-tabs="start" [(selectedIndex)]="selectedIndex"
               *ngIf="list() && list().exists !== false">
  <mat-tab label="List">
    <mat-card>
      <mat-card-header>
        <mat-card-subtitle>Settings</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <mat-expansion-panel class="cpbx-expansion-panel">
          <mat-expansion-panel-header>
            <mat-panel-title>
              Settings
            </mat-panel-title>
            <mat-panel-description>
              Click to get details
            </mat-panel-description>
          </mat-expansion-panel-header>
          <h3>Params:</h3>
          <app-key-value-pad-2 [exist]="list().settings"
                               [items]="list().settings"
                               [newItems]="list().settings?.new"
                               [id]="null"
                               [toCopy]="null"
                               [dispatchersCallbacks]="globalSettingsDispatchers"
                               [pending]="loadCounter() > 0"
          >
          </app-key-value-pad-2>
        </mat-expansion-panel>
      </mat-card-content>
    </mat-card>

    <mat-card>
      <mat-card-header>
        <mat-card-subtitle>Profiles</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <div *ngFor="let item of onlyValues(list().profiles); trackBy: trackByFn" class="panel-wrapper">
          <mat-expansion-panel class="cpbx-expansion-panel" (opened)="getDirectoryProfilesParams(item.id)"
                               [expanded]="panelCloser['profile' + item.id]">
            <mat-expansion-panel-header>
              <mat-panel-title>
                {{item.name}}
              </mat-panel-title>
              <mat-panel-description>
                Click to get details
              </mat-panel-description>
            </mat-expansion-panel-header>
            <button mat-flat-button color="basic" (click)="copyProfile(item.id)"
                    *ngIf="list().profiles[item.id] && (list().profiles[item.id].parameters)">Copy
            </button>
            <h3>Params:</h3>
            <div>
              <app-key-value-pad-2 [exist]="item.parameters"
                                   [items]="item.parameters"
                                   [newItems]="item.parameters?.new"
                                   [id]="item.id"
                                   [toCopy]="toCopyProfile"
                                   [dispatchersCallbacks]="profileSettingsDispatchers"
                                   [pending]="loadCounter() > 0"
              >
              </app-key-value-pad-2>
            </div>
          </mat-expansion-panel>
        </div>
      </mat-card-content>
    </mat-card>
  </mat-tab>

  <mat-tab label="Add">
    <form class="cpbx-form-panel" (ngSubmit)="onProfileSubmit()">
      <label class="kv-field">
        <span class="kv-label">Name</span>
        <input class="kv-input" placeholder="New profile name" required name="name" [(ngModel)]="newProfileName">
      </label>
      <button class="kv-button kv-button--primary" type="submit">Submit</button>
    </form>
  </mat-tab>

  <mat-tab label="Delete/Rename">
    <form class="cpbx-form-panel cpbx-form-panel--stack" #deleteForm="ngForm">
      <h3 class="cpbx-form-title">Profile:</h3>
      <div class="cpbx-edit-row" *ngFor="let profile of onlyValues(list().profiles); trackBy: trackByFn">
        <label class="kv-field">
          <span class="kv-label">Profile name</span>
          <input class="kv-input" required [ngModel]="profile.name"
            [name]="'profile::' + profile.id">
        </label>
        <div class="kv-actions">
          <button class="kv-button kv-button--primary" type="button"
            [disabled]="checkDirty(deleteForm.controls['profile::' + profile.id])"
            (click)="openBottomSheetProfile(profile.id, deleteForm.controls['profile::' + profile.id].value, profile.name, 'rename')">
            Update
          </button>
          <button class="kv-button kv-button--danger" type="button"
            (click)="openBottomSheetProfile(profile.id, deleteForm.controls['profile::' + profile.id].value, profile.name, 'delete')">
            Delete
          </button>
        </div>
      </div>
    </form>
  </mat-tab>
</mat-tab-group>

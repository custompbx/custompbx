<app-inner-header name="OSP" [loadCounter]="loadCounter()" [status]="statusText()" [statusTone]="statusTone()" [errorMessage]="errorMessage()">
  <button mat-stroked-button type="button" (click)="expandAllPanels()">Expand all</button>
  <button mat-stroked-button type="button" (click)="collapseAllPanels()">Collapse all</button>
</app-inner-header>
<app-module-not-exists-banner [list]="list()"></app-module-not-exists-banner>
 <mat-tab-group class="cpbx-tabs" mat-stretch-tabs="false" mat-align-tabs="start" [(selectedIndex)]="selectedIndex"
               *ngIf="list() && list().exists !== false">
  <mat-tab label="List">
    <mat-card>
      <mat-card-header>
        <mat-card-subtitle>Settings</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <mat-expansion-panel [expanded]="settingsExpanded">
          <mat-expansion-panel-header>
            <mat-panel-title>
              Settings
            </mat-panel-title>
            <mat-panel-description>
              Click to get details
            </mat-panel-description>
          </mat-expansion-panel-header>
          <h3>Params:</h3>
          <app-key-value-pad-2 [exist]="list().settings"
                               [items]="list().settings"
                               [newItems]="list().settings?.new"
                               [id]="null"
                               [toCopy]="null"
                               [pending]="loadCounter() > 0"
                               [dispatchersCallbacks]="globalSettingsDispatchers"
          >
          </app-key-value-pad-2>
        </mat-expansion-panel>
      </mat-card-content>
    </mat-card>

    <mat-card>
      <mat-card-header>
        <mat-card-subtitle>Profiles</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <div *ngFor="let item of onlyValues(list().profiles); trackBy: trackByFn" class="panel-wrapper">
          <mat-expansion-panel (opened)="getOspProfilesParams(item.id)"
                               [expanded]="panelCloser['profile' + item.id]">
            <mat-expansion-panel-header>
              <mat-panel-title>
                {{item.name}}
              </mat-panel-title>
              <mat-panel-description>
                Click to get details
              </mat-panel-description>
            </mat-expansion-panel-header>
            <button mat-stroked-button color="basic" class="config-copy-button" (click)="copyProfile(item.id)"
                    *ngIf="list().profiles[item.id] && (list().profiles[item.id].parameters)">Copy
            </button>
            <h3>Params:</h3>
            <div>
              <app-key-value-pad-2 [exist]="item.parameters"
                                   [items]="item.parameters"
                                   [newItems]="item.parameters?.new"
                                   [id]="item.id"
                                   [toCopy]="toCopyProfile"
                                   [pending]="loadCounter() > 0"
                                   [dispatchersCallbacks]="profileSettingsDispatchers"
              >
              </app-key-value-pad-2>
            </div>
          </mat-expansion-panel>
        </div>
      </mat-card-content>
    </mat-card>
  </mat-tab>

  <mat-tab label="Add">
    <form class="cpbx-form-panel" (ngSubmit)="onProfileSubmit()">
      <label class="cpbx-field cpbx-field--md">
<span class="cpbx-label">Name</span>
<input placeholder="New profile name" required name="name" [(ngModel)]="newProfileName" class="cpbx-input">
</label>
      <button mat-flat-button color="primary" type="submit">Submit</button>
    </form>
  </mat-tab>

  <mat-tab label="Delete/Rename">
    <form class="cpbx-form-panel cpbx-form-panel--stack" #deleteForm="ngForm">
      <h3 class="cpbx-form-title">Profiles</h3>
      <div class="cpbx-edit-row" *ngFor="let profile of onlyValues(list().profiles); trackBy: trackByFn">
        <label class="cpbx-field cpbx-field--md">
<span class="cpbx-label">Profile name</span>
<input name="Profile name" required [ngModel]="profile.name" [name]="'profile::' + profile.id" placeholder="Profile name" class="cpbx-input">
</label>
        <button mat-flat-button color="primary" type="button" [disabled]="checkDirty(deleteForm.controls['profile::' + profile.id])"
                (click)="openBottomSheetProfile(profile.id, deleteForm.controls['profile::' + profile.id].value, list().profiles[profile.id].name, 'rename')">
          Update
        </button>
        <button mat-stroked-button color="warn" type="button"
                (click)="openBottomSheetProfile(profile.id, deleteForm.controls['profile::' + profile.id].value, profile.name, 'delete')">
          Delete
        </button>
      </div>
    </form>
  </mat-tab>
</mat-tab-group>

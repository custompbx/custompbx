<app-inner-header name="LCR" [loadCounter]="loadCounter()" [status]="statusText()" [statusTone]="statusTone()" [errorMessage]="errorMessage()">
  <button class="cpbx-button cpbx-button--secondary" type="button" (click)="expandAllPanels()">Expand all</button>
  <button class="cpbx-button cpbx-button--secondary" type="button" (click)="collapseAllPanels()">Collapse all</button>
</app-inner-header>
<app-module-not-exists-banner [list]="list()"></app-module-not-exists-banner>
 <div *ngIf="list() && list().exists !== false">
  <app-tab-nav ariaLabel="LCR sections" [tabs]="['List', 'Add', 'Delete/Rename']" [(selectedIndex)]="selectedIndex"></app-tab-nav>
  <div class="cpbx-tab-panel" [hidden]="selectedIndex !== 0">
    <section class="cpbx-card">
      <header class="cpbx-card__header">
        <p class="cpbx-card__subtitle">Settings</p>
      </header>
      <div class="cpbx-card__content">
        <app-disclosure [expanded]="settingsExpanded">
            <span disclosureTitle>
              Settings
            </span>
            <span disclosureDescription>
              Click to get details
            </span>
          <h3>Params:</h3>
          <app-key-value-pad-2 [exist]="list().settings"
                               [items]="list().settings"
                               [newItems]="list().settings?.new"
                               [id]="null"
                               [toCopy]="null"
                               [pending]="loadCounter() > 0"
                               [dispatchersCallbacks]="globalSettingsDispatchers"
          >
          </app-key-value-pad-2>
        </app-disclosure>
      </div>
    </section>

    <section class="cpbx-card">
      <header class="cpbx-card__header">
        <p class="cpbx-card__subtitle">Profiles</p>
      </header>
      <div class="cpbx-card__content">
        <div *ngFor="let item of onlyValues(list().profiles); trackBy: trackByFn" class="panel-wrapper">
          <app-disclosure (opened)="getLcrProfilesParams(item.id)"
                               [expanded]="panelCloser['profile' + item.id]">
              <span disclosureTitle>
                {{item.name}}
              </span>
              <span disclosureDescription>
                Click to get details
              </span>
            <button class="config-copy-button cpbx-button cpbx-button--secondary" (click)="copyProfile(item.id)"
                    *ngIf="list().profiles[item.id] && (list().profiles[item.id].parameters)">Copy
            </button>
            <h3>Params:</h3>
            <div>
              <app-key-value-pad-2 [exist]="item.parameters"
                                   [items]="item.parameters"
                                   [newItems]="item.parameters?.new"
                                   [id]="item.id"
                                   [toCopy]="toCopyProfile"
                                   [pending]="loadCounter() > 0"
                                   [dispatchersCallbacks]="profileSettingsDispatchers"
              >
              </app-key-value-pad-2>
            </div>
          </app-disclosure>
        </div>
      </div>
    </section>
  </div>

  <div class="cpbx-tab-panel" [hidden]="selectedIndex !== 1">
    <form class="cpbx-form-panel" (ngSubmit)="onProfileSubmit()">
      <label class="cpbx-field cpbx-field--md">
<span class="cpbx-label">Name</span>
<input placeholder="New profile name" required name="name" [(ngModel)]="newProfileName" class="cpbx-input">
</label>
      <button class="cpbx-button cpbx-button--primary" type="submit">Submit</button>
    </form>
  </div>

  <div class="cpbx-tab-panel" [hidden]="selectedIndex !== 2">
    <form class="cpbx-form-panel cpbx-form-panel--stack" #deleteForm="ngForm">
      <h3 class="cpbx-form-title">Profiles</h3>
      <div class="cpbx-edit-row" *ngFor="let profile of onlyValues(list().profiles); trackBy: trackByFn">
        <label class="cpbx-field cpbx-field--md">
<span class="cpbx-label">Profile name</span>
<input name="Profile name" required [ngModel]="profile.name" [name]="'profile::' + profile.id" placeholder="Profile name" class="cpbx-input">
</label>
        <button class="cpbx-button cpbx-button--primary" type="button" [disabled]="checkDirty(deleteForm.controls['profile::' + profile.id])"
                (click)="openBottomSheetProfile(profile.id, deleteForm.controls['profile::' + profile.id].value, list().profiles[profile.id].name, 'rename')">
          Update
        </button>
        <button class="cpbx-button cpbx-button--danger-outline" type="button"
                (click)="openBottomSheetProfile(profile.id, deleteForm.controls['profile::' + profile.id].value, profile.name, 'delete')">
          Delete
        </button>
      </div>
    </form>
  </div>
</div>

<app-inner-header name="Opal" [loadCounter]="loadCounter()"></app-inner-header>
<app-module-not-exists-banner [list]="list()"></app-module-not-exists-banner>
@if (list() && list().exists !== false) {
  <app-tab-nav ariaLabel="Opal sections" [tabs]="['List', 'Add', 'Delete/Rename']"
    [(selectedIndex)]="selectedIndex"></app-tab-nav>
  <div class="cpbx-tab-panel" [hidden]="selectedIndex !== 0">
      <section class="cpbx-card">
        <header class="cpbx-card__header">
          <p class="cpbx-card__subtitle">Settings</p>
        </header>
        <div class="cpbx-card__content">
          <app-disclosure>
              <span disclosureTitle>
                Settings
              </span>
              <span disclosureDescription>
                Click to get details
              </span>
            <h3>Params:</h3>
            <app-key-value-pad-2 [exist]="list().settings"
                                 [items]="list().settings"
                                 [newItems]="list().settings?.new"
                                 [id]="null"
                                 [toCopy]="null"
                                 [dispatchersCallbacks]="globalSettingsDispatchers"
            >
            </app-key-value-pad-2>
          </app-disclosure>
        </div>
      </section>

      <section class="cpbx-card">
        <header class="cpbx-card__header">
          <p class="cpbx-card__subtitle">Listeners</p>
        </header>
        <div class="cpbx-card__content">
          @for (item of onlyValues(list().listeners); track item.id) {
            <div class="panel-wrapper">
              <app-disclosure (opened)="getOpalListenersParams(item.id)"
                                   [expanded]="panelCloser['listener' + item.id]">
                  <span disclosureTitle>
                    {{item.name}}
                  </span>
                  <span disclosureDescription>
                    Click to get details
                  </span>
                <button class="config-copy-button cpbx-button cpbx-button--secondary" (click)="copyListener(item.id)"
                        *ngIf="list().listeners[item.id] && (list().listeners[item.id].parameters)">Copy
                </button>
                <h3>Params:</h3>
                <div>
                  <app-key-value-pad-2 [exist]="item.parameters"
                                       [items]="item.parameters"
                                       [newItems]="item.parameters?.new"
                                       [id]="item.id"
                                       [toCopy]="toCopyListener"
                                       [dispatchersCallbacks]="listenerSettingsDispatchers"
                  >
                  </app-key-value-pad-2>
                </div>
              </app-disclosure>
            </div>
          }
        </div>
      </section>
    </div>

    <div class="cpbx-tab-panel" [hidden]="selectedIndex !== 1">
      <form class="cpbx-form-panel" (ngSubmit)="onListenerSubmit()">
        <label class="cpbx-field cpbx-field--md">
<span class="cpbx-label">Name</span>
<input placeholder="New listener name" required name="name" [ngModel]="newListenerName()" (ngModelChange)="newListenerName.set($event)" class="cpbx-input">
</label>
        <button class="cpbx-button cpbx-button--primary" type="submit">Submit</button>
      </form>
    </div>

    <div class="cpbx-tab-panel" [hidden]="selectedIndex !== 2">
      <form class="cpbx-form-panel cpbx-form-panel--stack" #deleteForm="ngForm">
        <h3 class="cpbx-form-title">Listeners</h3>
        @for (listener of onlyValues(list().listeners); track listener.id) {
          <div class="cpbx-edit-row">
            <label class="cpbx-field cpbx-field--md">
<span class="cpbx-label">Listener name</span>
<input name="Listener name" required [ngModel]="listener.name" [name]="'listener::' + listener.id" placeholder="Listener name" class="cpbx-input">
</label>
            <button class="cpbx-button cpbx-button--primary" type="button" [disabled]="checkDirty(deleteForm.controls['listener::' + listener.id])"
                    (click)="openBottomSheetListener(listener.id, deleteForm.controls['listener::' + listener.id].value, listener.name, 'rename')">
              Update
            </button>
            <button class="cpbx-button cpbx-button--danger-outline" type="button"
                    (click)="openBottomSheetListener(listener.id, deleteForm.controls['listener::' + listener.id].value, listener.name, 'delete')">
              Delete
            </button>
          </div>
        }
      </form>
    </div>
}

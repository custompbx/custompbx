@if (loadCounter > 0) {
  <div class="cpbx-loading-bar" role="progressbar" [attr.aria-label]="'common.loading' | transloco"></div>
}
<header class="page-header">
  <div class="page-heading">
    <div class="title-row">
      <h1>{{translationKey ? (translationKey | transloco) : name}}</h1>
      @if (status) {
        <span class="status-badge"
          [class.success]="statusTone === 'success'"
          [class.warning]="statusTone === 'warning'"
          [class.danger]="statusTone === 'danger'">{{status}}</span>
      }
    </div>
    @if (subtitleKey || subtitle) { <p>{{subtitleKey ? (subtitleKey | transloco) : subtitle}}</p> }
  </div>
  <div class="page-actions" [attr.aria-label]="'common.pageActions' | transloco"><ng-content></ng-content></div>
</header>
@if (errorMessage) {
  <section class="page-error" role="alert">
    <app-icon name="error"></app-icon>
    <div>
      <strong>{{'common.lastOperationFailed' | transloco}}</strong>
      <p>{{errorMessage}}</p>
    </div>
  </section>
}

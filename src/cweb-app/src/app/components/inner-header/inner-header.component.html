@if (loadCounter > 0) {
  <div class="cpbx-loading-bar" role="progressbar" aria-label="Loading"></div>
}
<header class="page-header">
  <div class="page-heading">
    <div class="title-row">
      <h1>{{name}}</h1>
      @if (status) {
        <span class="status-badge"
          [class.success]="statusTone === 'success'"
          [class.warning]="statusTone === 'warning'"
          [class.danger]="statusTone === 'danger'">{{status}}</span>
      }
    </div>
    @if (subtitle) { <p>{{subtitle}}</p> }
  </div>
  <div class="page-actions" aria-label="Page actions"><ng-content></ng-content></div>
</header>
@if (errorMessage) {
  <section class="page-error" role="alert">
    <app-icon name="error"></app-icon>
    <div>
      <strong>Last operation failed</strong>
      <p>{{errorMessage}}</p>
    </div>
  </section>
}

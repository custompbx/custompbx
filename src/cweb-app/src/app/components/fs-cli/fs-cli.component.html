@if (loadCounter() > 0) {
  <mat-progress-bar mode="indeterminate"></mat-progress-bar>
}
<mat-toolbar color="basic">
  <span>FS_CLI</span>
</mat-toolbar>
<div class="fs-cli-card">
  <div class="cpbx-form-panel">
    <label class="cpbx-field cpbx-field--wide">
<span class="cpbx-label">Command</span>
<input name="value" placeholder="Enter FreeSWITCH command" [ngModel]="command()" (ngModelChange)="command.set($event)" appResizeInput [resizeOnString]="command()" required (keyup.enter)="runCommand()" class="cpbx-input">
</label>
      <button mat-flat-button color="primary" class="switch-button" [disabled]="!command()"
        (click)="runCommand()">
        Run Command
      </button>
    </div>
    @if (list().fsCliData) {
      <div class="term-field">
        <pre class="term-body">{{list().fsCliData}}</pre>
      </div>
    }
  </div>

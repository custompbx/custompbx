<header class="app-toolbar" role="banner">
  <button class="cpbx-button cpbx-button--icon" (click)="toggleMenu.emit()" title="Toggle navigation" aria-label="Toggle navigation">
    <app-icon name="menu"></app-icon>
  </button>
  <a class="brand" routerLink="/dashboard" aria-label="CustomPBX dashboard">
    <img class="brand-logo" src="./assets/img/logo-small.png" alt="">
    <span class="brand-name">CustomPBX</span>
  </a>
  <span class="example-spacer"></span>
  <div class="header-actions" aria-label="Application actions">
    <button class="header-icon-button cpbx-button cpbx-button--icon" (click)="showHideConversations()" title="Conversations" aria-label="Open conversations">
      <app-icon name="question_answer"></app-icon>
    </button>
    <button class="header-icon-button cpbx-button cpbx-button--icon" (click)="showHidePhone()" title="Phone" aria-label="Toggle phone">
      <app-icon name="phone"></app-icon>
    </button>
    <button class="header-icon-button cpbx-button cpbx-button--icon" (click)="cloneComponent()" [disabled]="!currentComponent"
      title="Duplicate current view" aria-label="Duplicate current view">
      <app-icon name="filter_2"></app-icon>
    </button>
    @if (user()?.group_id === 1) {
      <button class="header-icon-button cpbx-button cpbx-button--icon" [routerLink]="['/settings']" title="Settings" aria-label="Open settings">
        <app-icon name="settings"></app-icon>
      </button>
    }
  </div>
  <details class="user-menu">
    <summary class="user-block" aria-label="Open user menu">
      @if (!user()?.avatar_format) {
        <app-icon class="user-avatar-icon" name="face"></app-icon>
      }
      @if (user()?.avatar_format) {
        <img class="avatar-img"
          [src]="'./assets/img/avatar/' + user().id + '.' + user().avatar_format" alt="">
        }
      <span class="user-name">{{user()?.login}}</span>
    </summary>
    <div class="user-menu__panel" role="menu">
      <button type="button" class="user-menu__item" role="menuitem">
        <app-icon name="account_circle"></app-icon>
        <span>Profile</span>
      </button>
      @if (user()?.group_id === 1) {
        <button type="button" class="user-menu__item" role="menuitem" [routerLink]="['/settings']">
          <app-icon name="settings"></app-icon>
          <span>Settings</span>
        </button>
      }
      <button type="button" class="user-menu__item" role="menuitem" (click)="logOut()">
        <app-icon name="keyboard_tab"></app-icon>
        <span>Log out</span>
      </button>
    </div>
  </details>
</header>
  <div [hidden]="hidePhone()">
    @if (startPhone()) {
      <app-phone></app-phone>
    }
  </div>

  <ng-container #componentContainer></ng-container>

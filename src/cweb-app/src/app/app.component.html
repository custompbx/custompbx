<app-service-status></app-service-status>
@if (userService.isAuthenticated && !login) {
  <app-header [currentComponent]="currentComponent"
  (showRightSideNav)="toggleRightSideNav($event)"
  (toggleMenu)="toggleNavigation()"></app-header>
}
<mat-sidenav-container class="sidenav-container">
  <mat-sidenav [mode]="compact() ? 'over' : 'side'" [opened]="userService.isAuthenticated && !login && menuOpen"
    (closedStart)="menuOpen = false">
    <mat-nav-list>
      <div class="menu-sidenav">
        <app-sidenav></app-sidenav>
      </div>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    @if (userService.isAuthenticated && !login) {
      <div [hidden]="!showRightNav">
        <app-conversations></app-conversations>
      </div>
    }
    <main class="app-main" [hidden]="showRightNav">
      <router-outlet (activate)="onRouterOutletActivate($event)"></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>

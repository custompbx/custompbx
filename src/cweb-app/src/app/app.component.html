<app-service-status></app-service-status>
<app-toast-container></app-toast-container>
<app-confirmation-dialog></app-confirmation-dialog>
@if (userService.isAuthenticated && !login) {
  <app-header [currentComponent]="currentComponent"
  (showRightSideNav)="toggleRightSideNav()"
  (toggleMenu)="toggleNavigation()"></app-header>
}
<div class="app-shell" [class.app-shell--authenticated]="userService.isAuthenticated && !login"
  [class.app-shell--collapsed]="!compact() && !menuOpen">
  @if (userService.isAuthenticated && !login) {
    @if (compact() && menuOpen) {
      <button class="nav-backdrop" type="button" aria-label="Close navigation" (click)="menuOpen = false"></button>
    }
    <aside class="app-sidebar" [class.app-sidebar--open]="!compact() || menuOpen" aria-label="Main navigation">
      <nav class="menu-sidenav">
        <app-sidenav [collapsed]="!compact() && !menuOpen"></app-sidenav>
      </nav>
    </aside>
  }
  <div class="app-content">
    @if (userService.isAuthenticated && !login) {
      @if (showRightNav) {
        <app-conversations (closeConversations)="showRightNav = false"></app-conversations>
      }
    }
    <main class="app-main">
      <router-outlet (activate)="onRouterOutletActivate($event)"></router-outlet>
    </main>
  </div>
</div>

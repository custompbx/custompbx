name: Build and Publish Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      freeswitch_version:
        description: "Exact SignalWire Debian package version; leave empty for latest"
        required: false
        type: string
permissions:
  contents: read
  packages: write

jobs:
  custompbx:
    if: github.repository == 'custompbx/custompbx' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/custompbx/custompbx
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push CustomPBX
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

  freeswitch:
    if: github.repository == 'custompbx/custompbx'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/custompbx/freeswitch
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push FreeSWITCH
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/fs.Dockerfile
          push: true
          no-cache: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            FREESWITCH_VERSION=${{ inputs.freeswitch_version || '' }}
          secrets: |
            signalwire_token=${{ secrets.SIGNALWIRE_TOKEN }}

name: Quality

on:
  pull_request:
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: src/custompbx/go.mod
          cache-dependency-path: src/custompbx/go.sum
      - run: cp config.example.json /tmp/custompbx-test.json
      - run: |
          files="$(find . -name '*.go' ! -path './cweb/cweb.go' -print0 | xargs -0 gofmt -l)"
          test -z "$files" || (echo "$files" && exit 1)
        working-directory: src/custompbx
      - run: go vet ./...
        working-directory: src/custompbx
        env: { CUSTOMPBX_CONFIG: /tmp/custompbx-test.json }
      - run: go test ./...
        working-directory: src/custompbx
        env: { CUSTOMPBX_CONFIG: /tmp/custompbx-test.json }
      - run: go test -race ./web ./webStruct ./cfg ./db
        working-directory: src/custompbx
        env: { CUSTOMPBX_CONFIG: /tmp/custompbx-test.json }
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...
        working-directory: src/custompbx

  docker-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target backend-fmt -f docker/Dockerfile .
      - run: docker build --target backend-vet -f docker/Dockerfile .
      - run: docker build --target backend-test -f docker/Dockerfile .
      - run: docker build --target backend-race -f docker/Dockerfile .

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/cweb-app/package-lock.json
      - run: npm ci
        working-directory: src/cweb-app
      - run: npm audit --audit-level=high
        working-directory: src/cweb-app
      - run: npm run test:i18n
        working-directory: src/cweb-app
      - run: docker build --target frontend-test -f docker/Dockerfile .

  docker-frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target frontend -f docker/Dockerfile .

  docker-release:
    runs-on: ubuntu-latest
    needs: [docker-backend, frontend, docker-frontend-build, integration]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f docker/Dockerfile .

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from integration-test

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare tracked release tree
        run: |
          mkdir -p /tmp/custompbx-release-tree
          git archive HEAD | tar -x -C /tmp/custompbx-release-tree
      - name: Scan tracked release tree for secrets
        run: >-
          docker run --rm
          -v "/tmp/custompbx-release-tree:/repo:ro"
          ghcr.io/gitleaks/gitleaks:v8.28.0
          dir /repo
          --no-banner
          --redact
          --verbose
